<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">tmux-opencode popup preview</title>
  <desc id="desc">A fictional tmux popup browser showing OpenCode sessions with colored status dots, normalized statuses, titles, directories, and a small tmux status segment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1727"/>
      <stop offset="100%" stop-color="#050912"/>
    </linearGradient>
    <radialGradient id="glowA" cx="28%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#1d4ed8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#101826"/>
      <stop offset="100%" stop-color="#0b1320"/>
    </linearGradient>
    <linearGradient id="rowHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#182131" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <ellipse cx="430" cy="170" rx="510" ry="380" fill="url(#glowA)" filter="url(#soft)"/>
  <ellipse cx="1250" cy="240" rx="470" ry="330" fill="url(#glowB)" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="90" width="1360" height="720" rx="24" fill="#060b14" stroke="#243244" stroke-opacity="0.9"/>
    <rect x="132" y="102" width="1336" height="42" rx="16" fill="url(#bar)"/>
    <circle cx="160" cy="123" r="6" fill="#ef4444"/>
    <circle cx="180" cy="123" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="123" r="6" fill="#22c55e"/>
    <text x="236" y="129" fill="#a8b3c7" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" letter-spacing="0.2">tmux • prefix + O • popup session browser</text>
    <text x="1370" y="129" fill="#6b7280" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">OpenCode</text>

    <rect x="172" y="180" width="1256" height="512" rx="20" fill="url(#panel)" stroke="#293244" stroke-opacity="0.95"/>
    <rect x="184" y="192" width="1232" height="36" rx="12" fill="#0f1724"/>
    <text x="208" y="216" fill="#d7def0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="700">OpenCode sessions</text>
    <text x="1390" y="216" fill="#8b97ab" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">opencode &gt;</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">
      <rect x="188" y="246" width="1224" height="68" rx="14" fill="url(#rowHi)" stroke="#374151" stroke-opacity="0.8"/>
      <circle cx="220" cy="280" r="7" fill="#f59e0b"/>
      <text x="244" y="287" fill="#fbbf24">process</text>
      <text x="398" y="287" fill="#f3f4f6">Refactor command palette</text>
      <text x="1380" y="287" fill="#93a0b5" text-anchor="end" font-size="18">/Users/CoderMungan/code/atlas-ui</text>

      <circle cx="220" cy="344" r="7" fill="#ef4444"/>
      <text x="244" y="351" fill="#fb7185">approve</text>
      <text x="398" y="351" fill="#f3f4f6">Review export flow</text>
      <text x="1380" y="351" fill="#93a0b5" text-anchor="end" font-size="18">/Users/CoderMungan/code/atlas-ui</text>

      <circle cx="220" cy="408" r="7" fill="#9ca3af"/>
      <text x="244" y="415" fill="#d1d5db">done</text>
      <text x="398" y="415" fill="#f3f4f6">Polish onboarding cards</text>
      <text x="1380" y="415" fill="#93a0b5" text-anchor="end" font-size="18">/Users/CoderMungan/code/atlas-ui</text>

      <circle cx="220" cy="472" r="7" fill="#f59e0b"/>
      <text x="244" y="479" fill="#fbbf24">process</text>
      <text x="398" y="479" fill="#f3f4f6">Update tmux bindings</text>
      <text x="1380" y="479" fill="#93a0b5" text-anchor="end" font-size="18">/Users/CoderMungan/code/tmux-tools</text>

      <circle cx="220" cy="536" r="7" fill="#9ca3af"/>
      <text x="244" y="543" fill="#d1d5db">done</text>
      <text x="398" y="543" fill="#f3f4f6">Notes sync cleanup</text>
      <text x="1380" y="543" fill="#93a0b5" text-anchor="end" font-size="18">/Users/CoderMungan/work/notes-app</text>
    </g>

    <rect x="184" y="602" width="1232" height="68" rx="14" fill="#0a111b" stroke="#243244" stroke-opacity="0.85"/>
    <text x="208" y="642" fill="#8b97ab" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Enter: jump or resume   •   Esc: close   •   Search is hidden in the popup</text>

    <rect x="120" y="820" width="1360" height="34" rx="0" fill="#08101a" opacity="0.95"/>
    <rect x="1042" y="822" width="326" height="26" rx="13" fill="#111827" stroke="#334155" stroke-opacity="0.9"/>
    <text x="1062" y="840" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">OC:</text>
    <text x="1093" y="840" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">7</text>
    <text x="1118" y="840" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">P:</text>
    <text x="1145" y="840" fill="#fbbf24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">2</text>
    <text x="1170" y="840" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">A:</text>
    <text x="1198" y="840" fill="#fb7185" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">1</text>
    <text x="1225" y="840" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">D:</text>
    <text x="1252" y="840" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">4</text>
  </g>
</svg>
